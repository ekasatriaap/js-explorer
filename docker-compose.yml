services:
  mariadb:
    image: mariadb
    container_name: mariadb-js-explorer
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: js_explorer
    ports:
      - "3306:3306"
    volumes:
      - js-explorer-db:/var/lib/mysql

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend-js-explorer
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      - DB_HOST=mariadb
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=root
      - DB_NAME=js_explorer
      - PORT=3000
    depends_on:
      - mariadb

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend-js-explorer
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:3000/api/v1
    depends_on:
      - backend

volumes:
  js-explorer-db:
